name: Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout repo
      # -------------------------
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # Setup Node (OIDC enabled)
      # -------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          always-auth: true
          provenance: true

      # -------------------------
      # Debug environment
      # -------------------------
      - name: Debug environment
        run: |
          node -v
          npm -v
          npm config get registry

      # -------------------------
      # Configure git
      # -------------------------
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # -------------------------
      # Determine version bump
      # -------------------------
      - name: Determine version bump
        id: bump
        run: |
          MSG=$(git log -1 --pretty=%B)

          if echo "$MSG" | grep -q '\[major\]'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -q '\[minor\]'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      # -------------------------
      # Bump version + tag
      # -------------------------
      - name: Bump version and create tag
        run: npm version ${{ steps.bump.outputs.type }} --no-git-tag-version

      - name: Commit version bump
        run: |
          git add package.json
          git commit -m "chore: bump version [skip ci]" || echo "No changes"

      - name: Get tag
        id: tag
        run: echo "name=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      # -------------------------
      # Inspect package
      # -------------------------
      - name: Inspect package
        run: cat package.json

      # -------------------------
      # npm diagnostics
      # -------------------------
      - name: npm diagnostics
        run: |
          npm config list
          npm whoami || true

      # -------------------------
      # Verify version
      # -------------------------
      - name: Verify version
        run: node -p "require('./package.json').version"

      # -------------------------
      # Dry run publish
      # -------------------------
      - name: npm publish dry run
        run: npm publish --dry-run --provenance --access public

      # -------------------------
      # Publish (OIDC + fallback token)
      # -------------------------
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      # -------------------------
      # Push version + tags
      # -------------------------
      - name: Push version bump and tags
        run: git push --follow-tags

      # -------------------------
      # GitHub release
      # -------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
