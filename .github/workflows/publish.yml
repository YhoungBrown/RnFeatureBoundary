name: Publish

on:
  pull_request:
    types: [closed]
    branches:
      - fix/publish-oidc

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout repo
      # -------------------------
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # -------------------------
      # Setup Node (OIDC)
      # -------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          provenance: true

      # -------------------------
      # Determine version bump from PR labels
      # -------------------------
      - name: Determine version bump from labels
        id: bump
        run: |
          LABELS="${{ toJson(github.event.pull_request.labels) }}"

          echo "Labels: $LABELS"

          if echo "$LABELS" | grep -q "major"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "minor"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      # -------------------------
      # Git config
      # -------------------------
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # -------------------------
      # Bump version
      # -------------------------
      - name: Bump version
        run: npm version ${{ steps.bump.outputs.type }} --no-git-tag-version

      # -------------------------
      # Commit version bump (ADDED STEP)
      # -------------------------
      - name: Commit version bump
        run: |
          git add package.json
          git commit -m "chore: bump version [skip ci]" || echo "no changes"

      # -------------------------
      # Verify version
      # -------------------------
      - name: Verify version
        run: node -p "require('./package.json').version"

      # -------------------------
      # Dry run publish
      # -------------------------
      - name: Dry run publish
        run: npm publish --dry-run --access public --provenance

      # -------------------------
      # Publish to npm (OIDC)
      # -------------------------
      - name: Publish to npm
        run: npm publish --access public --provenance

      # -------------------------
      # Push changes back to repo
      # -------------------------
      - name: Push version bump
        run: git push origin main
