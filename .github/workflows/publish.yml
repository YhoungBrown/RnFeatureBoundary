name: Publish

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  id-token: write # Required for OIDC

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # CRITICAL STEP: Bumps npm to v11+ to support tokenless OIDC publishing
      - name: Upgrade npm
        run: npm install -g npm@latest

      # ... [Your exact "Determine version bump" and "Configure git" steps remain unchanged] ...

      - name: Determine version bump from labels
        id: bump
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          echo "Labels: $LABELS_JSON"
          if echo "$LABELS_JSON" | grep -q '"name": "major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS_JSON" | grep -q '"name": "minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version with collision guard
        run: |
          TYPE="${{ steps.bump.outputs.type }}"
          NAME=$(node -p "require('./package.json').name")
          CURRENT=$(node -p "require('./package.json').version")
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          if [ "$TYPE" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEXT="$MAJOR.$MINOR.$PATCH"

          while npm view "$NAME@$NEXT" version &>/dev/null; do
            if [ "$TYPE" = "major" ]; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif [ "$TYPE" = "minor" ]; then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            NEXT="$MAJOR.$MINOR.$PATCH"
          done

          echo "Publishing $NEXT"
          npm version "$NEXT" --no-git-tag-version

      - name: Commit version bump
        run: |
          git add package.json
          git commit -m "chore: bump version [skip ci]" || echo "no changes"

      - name: Verify version
        run: node -p "require('./package.json').version"

      # No NODE_AUTH_TOKEN required here anymore!
      - name: Dry run publish
        run: npm publish --dry-run --access public --provenance

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Push version bump
        run: git push origin main
