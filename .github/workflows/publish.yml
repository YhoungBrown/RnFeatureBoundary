name: Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          always-auth: true
          provenance: true

      - name: Debug environment
        run: |
          node -v
          npm -v
          npm config get registry

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump
        id: bump
        run: |
          MSG=$(git log -1 --pretty=%B)

          if echo "$MSG" | grep -q '\[major\]'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -q '\[minor\]'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        run: npm version ${{ steps.bump.outputs.type }} --no-git-tag-version

      - name: Commit version bump
        run: |
          git add package.json
          git commit -m "chore: bump version [skip ci]" || echo "no changes"

      - name: Verify version
        run: node -p "require('./package.json').version"

      - name: Dry run publish
        run: npm publish --dry-run --access public --provenance

      # -------------------------
      # AUTH FIX (THIS IS THE KEY)
      # -------------------------
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Push version + tags
        run: git push --follow-tags
